# NexT theme overrides. Keep custom values here so npm theme upgrades do not
# overwrite site-specific configuration.

favicon:
  small: /images/AlanFangicon16X16.png
  medium: /images/AlanFangicon32X32.ico
  apple_touch_icon: /images/apple-touch-icon-next.png
  safari_pinned_tab: /images/logo.svg

keywords: "Hexo, NexT"

footer:
  powered: false
  theme:
    enable: false
    version: false

menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  archives: /archives/ || fa fa-archive

scheme: Mist

toc:
  enable: true
  number: true
  wrap: false

creative_commons:
  license: by-nc-sa
  sidebar: false
  post: false

local_search:
  enable: true
  top_n_per_article: 3
  unescape: true
  preload: false

# GitHub-backed comments. Giscus stores comments in GitHub Discussions, so the
# static site does not need a custom database or backend service.
comments:
  style: tabs
  active: giscus
  storage: true
  lazyload: false

utterances:
  enable: false
  repo: fclearner/fclearner.github.io
  issue_term: pathname
  theme: preferred-color-scheme

giscus:
  enable: true
  repo: fclearner/fclearner.github.io
  repo_id: MDEwOlJlcG9zaXRvcnkxOTQwMTgyMjk=
  category: Announcements
  category_id:
  mapping: pathname
  strict: false
  reactions_enabled: true
  emit_metadata: false
  input_position: bottom
  theme: preferred_color_scheme
  lang: zh-CN
