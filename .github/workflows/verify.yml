name: Verify Blog Source

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check:encoding
      - run: npm run build
      - run: npm run check:site
      - run: npm audit --omit=dev
      - run: npm exec --yes @fission-ai/openspec@latest -- validate --all --strict
